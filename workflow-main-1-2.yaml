name: actionprofile CICD Workflow
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  ECR_REPOSITORY: 'actionprofile'

permissions:
  contents: read

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Maven Build
        run: mvn clean install -DskipTests

      - name: Upload Build Artifact (WAR)
        uses: actions/upload-artifact@v4
        with:
          name: actionprofile-app
          path: target/*.war


  Unit_Test:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Unit Tests
        run: mvn test


  BUILD_AND_PUBLISH:
    name: BUILD_AND_PUBLISH
    runs-on: ubuntu-latest
    needs: [Build, Unit_Test]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Code checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest


  Notify_DevOps_Agent:
    name: Notify DevOps Agent on Failure
    runs-on: ubuntu-latest
    needs: [Build, Unit_Test, BUILD_AND_PUBLISH]
    if: always() && (needs.Build.result == 'failure' || needs.Unit_Test.result == 'failure' || needs.BUILD_AND_PUBLISH.result == 'failure')
    steps:
      - name: Determine failed job
        id: failed_job
        run: |
          if [ "${{ needs.Build.result }}" = "failure" ]; then
            echo "name=Build" >> $GITHUB_OUTPUT
            echo "detail=Maven Build or artifact upload failed." >> $GITHUB_OUTPUT
          elif [ "${{ needs.Unit_Test.result }}" = "failure" ]; then
            echo "name=Unit_Test" >> $GITHUB_OUTPUT
            echo "detail=Maven unit tests failed." >> $GITHUB_OUTPUT
          else
            echo "name=BUILD_AND_PUBLISH" >> $GITHUB_OUTPUT
            echo "detail=Docker image build or ECR push failed." >> $GITHUB_OUTPUT
          fi

      - name: Trigger DevOps Agent Investigation
        env:
          DEVOPS_AGENT_WEBHOOK_URL: ${{ secrets.DEVOPS_AGENT_WEBHOOK_URL }}
          DEVOPS_AGENT_WEBHOOK_SECRET: ${{ secrets.DEVOPS_AGENT_WEBHOOK_SECRET }}
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)
          INCIDENT_ID=$(cat /proc/sys/kernel/random/uuid)
          FAILED_JOB="${{ steps.failed_job.outputs.name }}"
          DETAIL="${{ steps.failed_job.outputs.detail }}"

          PAYLOAD=$(printf \
            '{"eventType":"incident","incidentId":"%s","action":"created","priority":"HIGH","title":"[GITHUB ACTIONS] actionprofile workflow failed on %s","description":"Source: GitHub Actions. %s Investigate the failure related to the latest commit. Workflow:%s Job:%s Branch:%s Commit:%s Run URL:https://github.com/%s/actions/runs/%s 1. Review changes in the latest commit 2. Analyze GitHub Actions logs 3. Identify root cause and suggest a fix","service":"actionprofile-github-actions","timestamp":"%s","data":{"metadata":{"source":"GitHub Actions","repository":"%s","branch":"%s","commit":"%s","workflow":"%s","run_id":"%s","actor":"%s","failed_job":"%s"}}}' \
            "$INCIDENT_ID" \
            "${{ github.ref_name }}" \
            "$DETAIL" \
            "${{ github.workflow }}" \
            "$FAILED_JOB" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}" \
            "${{ github.repository }}" \
            "${{ github.run_id }}" \
            "$TIMESTAMP" \
            "${{ github.repository }}" \
            "${{ github.ref_name }}" \
            "${{ github.sha }}" \
            "${{ github.workflow }}" \
            "${{ github.run_id }}" \
            "${{ github.actor }}" \
            "$FAILED_JOB")

          SIGNATURE=$(echo -n "${TIMESTAMP}:${PAYLOAD}" | \
            openssl dgst -sha256 -hmac "$DEVOPS_AGENT_WEBHOOK_SECRET" -binary | \
            base64 -w 0)

          HTTP_STATUS=$(curl -s -o /tmp/response.txt -w "%{http_code}" \
            -X POST "$DEVOPS_AGENT_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "x-amzn-event-timestamp: $TIMESTAMP" \
            -H "x-amzn-event-signature: $SIGNATURE" \
            -d "$PAYLOAD")

          echo "DevOps Agent webhook -> HTTP $HTTP_STATUS"
          cat /tmp/response.txt
          exit 0
